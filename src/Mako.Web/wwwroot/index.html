<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>MAKO — Web</title>
    <base href="/" />
    <style>
        :root {
            color-scheme: dark;
            --mw-bg: #0f0f1e;
            --mw-card: #141222;
            --mw-muted: #1b192b;
            --mw-border: rgba(100, 100, 120, 0.25);
            --mw-fg: #f2f2f5;
            --mw-fg-muted: #b0a6be;
            --mw-accent: #ec4899;
            --mw-ok: #4ade80;
            --mw-err: #f87171;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
            margin: 0; background: var(--mw-bg); color: var(--mw-fg);
        }
        main { display: flex; flex-direction: column; height: 100%; }
        .mw-toolbar {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; background: var(--mw-card); border-bottom: 1px solid var(--mw-border);
        }
        .mw-toolbar .mw-status { font-size: 12px; color: var(--mw-fg-muted); }
        .mw-panes { display: flex; flex: 1; min-height: 0; }
        textarea, pre {
            flex: 1; margin: 0; padding: 14px; box-sizing: border-box; border: none;
            font: inherit; font-size: 13px; line-height: 1.55;
        }
        textarea {
            background: var(--mw-bg); color: var(--mw-fg); resize: none;
            border-right: 1px solid var(--mw-border); outline: none;
        }
        textarea:focus { background: #101020; }
        pre { background: var(--mw-bg); color: var(--mw-ok); overflow: auto; white-space: pre-wrap; }
        pre.error { color: var(--mw-err); }
        button {
            padding: 6px 16px; background: var(--mw-accent); color: white; border: none;
            border-radius: 6px; cursor: pointer; font: inherit; font-size: 13px; font-weight: 600;
            transition: filter 0.15s ease;
        }
        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:disabled { background: var(--mw-muted); color: var(--mw-fg-muted); cursor: default; }
    </style>
</head>
<body>
    <div id="app">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#b0a6be;font-size:13px;">
            Loading MAKO…
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none; background: #b00; color: white; padding: 8px;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
